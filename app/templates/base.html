<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}calibre-web-cli{% endblock %}</title>
  <link rel="stylesheet" href="/static/calibre-web-cli.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body{% if device and device.connected %} data-device-connected="true"{% endif %}>
  <header class="app">
    <h1><a href="/">calibre-web-cli</a></h1>
    <nav>
      <a href="/">Library</a>
      <a href="/jobs">Jobs</a>
    </nav>
    <button type="button" onclick="document.getElementById('modal-upload').showModal()">Upload books</button>
    <span style="flex:1"></span>
    <span id="device-status"
          hx-get="/device/status"
          hx-trigger="load, every 5s"
          hx-swap="outerHTML">
      {% include "_fragments/device_status.html" with context %}
    </span>
  </header>
  <main>
    {% block main %}{% endblock %}
  </main>
  {% include "_fragments/upload_modal.html" %}
</body>
</html>
